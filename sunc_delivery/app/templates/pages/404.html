{% extends "base.html" %}
{% block title %}Страница не найдена — Доставка СУНЦ{% endblock %}

{% block content %}
<div class="grid min-h-[60vh] place-items-center">
  <div class="max-w-xl rounded-[2rem] border border-slate-200 bg-white p-8 text-center shadow-soft">
    <div class="mx-auto grid h-20 w-20 place-items-center rounded-full bg-slate-100 text-3xl font-bold text-slate-900">404</div>
    <h1 class="mt-6 text-3xl font-bold text-slate-900">Страница не найдена</h1>
    <p class="mt-3 text-sm leading-6 text-slate-600">
      Похоже, такой страницы не существует или ссылка устарела.
    </p>
    <div class="mt-6 flex flex-wrap justify-center gap-3">
      <a href="{{ request.url_for('home') }}" class="rounded-2xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">
        На главную
      </a>
      <a href="{{ request.url_for('catalog') }}" class="rounded-2xl border border-slate-200 px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">
        В каталог
      </a>
    </div>
  </div>
</div>
{% endblock %}
